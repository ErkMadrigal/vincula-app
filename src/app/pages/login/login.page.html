<ion-content class="login-content">
      <div class="login-container">

        <!-- Logo -->
        <div class="logo-area">
          <svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="30 90 440 310" class="logo-svg">
            <defs>
              <style>
                .pulse1 { animation: pulse 2s ease-out infinite; transform-origin: 256px 230px; }
                .pulse2 { animation: pulse 2s ease-out 0.5s infinite; transform-origin: 256px 230px; }
                .pulse3 { animation: pulse 2s ease-out 1s infinite; transform-origin: 256px 230px; }
                .dash-l { animation: dashMove 1.8s linear infinite; }
                .dash-r { animation: dashMove 1.8s linear 0.6s infinite; }
                .wm     { font-family: Arial, sans-serif; font-size: 72px; font-weight: 700; letter-spacing: 10px; fill: white; }
                .wm-v   { font-family: Arial, sans-serif; font-size: 72px; font-weight: 700; letter-spacing: 10px; fill: #00D4C8; }
                .tag    { font-family: Arial, sans-serif; font-size: 15px; font-weight: 400; letter-spacing: 4px; fill: rgba(255,255,255,0.5); }
                @keyframes pulse {
                  0%   { opacity: 0; transform: scale(0.85); }
                  30%  { opacity: 0.6; }
                  100% { opacity: 0; transform: scale(1.15); }
                }
                @keyframes dashMove {
                  0%   { stroke-dashoffset: 120; opacity: 1; }
                  100% { stroke-dashoffset: 0;   opacity: 0.2; }
                }
              </style>
            </defs>

            <!-- Pulse rings -->
            <circle class="pulse1" cx="256" cy="230" r="36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"/>
            <circle class="pulse2" cx="256" cy="230" r="54" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.3"/>
            <circle class="pulse3" cx="256" cy="230" r="72" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

            <!-- V ghost -->
            <polyline points="196,110 256,230 316,110" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Animated dashes left arm -->
            <polyline class="dash-l" points="256,230 196,110" fill="none" stroke="#00D4C8" stroke-width="3.5" stroke-dasharray="8 6" stroke-dashoffset="120" stroke-linecap="round"/>
            <!-- Animated dashes right arm -->
            <polyline class="dash-r" points="256,230 316,110" fill="none" stroke="white" stroke-width="3.5" stroke-dasharray="8 6" stroke-dashoffset="120" stroke-linecap="round"/>

            <!-- Center dot glow -->
            <circle cx="256" cy="230" r="14" fill="rgba(0,212,200,0.15)"/>
            <circle cx="256" cy="230" r="9" fill="rgba(0,212,200,0.3)"/>
            <circle cx="256" cy="230" r="5" fill="#00D4C8"/>

            <!-- Arm end dots -->
            <circle cx="196" cy="110" r="7" fill="#00D4C8"/>
            <circle cx="316" cy="110" r="7" fill="white"/>

            <!-- Accent dots -->
            <circle cx="226" cy="174" r="3.5" fill="rgba(255,255,255,0.4)"/>
            <circle cx="286" cy="174" r="3.5" fill="rgba(255,255,255,0.4)"/>

            <!-- Divider -->
            <circle cx="156" cy="272" r="4" fill="rgba(255,255,255,0.3)"/>
            <line x1="164" y1="272" x2="348" y2="272" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
            <circle cx="356" cy="272" r="4" fill="rgba(255,255,255,0.3)"/>

            <!-- Wordmark -->
            <text x="256" y="356" text-anchor="middle">
              <tspan class="wm-v">V</tspan><tspan class="wm">INCULA365</tspan>
            </text>

            <!-- Tagline -->
            <text x="256" y="392" text-anchor="middle" class="tag">educación · conexión · comunidad</text>
          </svg>
        </div>

        <!-- Form -->
        <div class="form-card">
          <h2 class="form-title">Iniciar sesión</h2>

          <div class="input-group">
            <label class="input-label">CURP</label>
            <div class="input-wrapper">
              <ion-icon name="person-outline" class="input-icon"></ion-icon>
              <input
                [(ngModel)]="curp"
                type="text"
                maxlength="18"
                placeholder="AAAA000000HDFXXX00"
                class="custom-input"
                (input)="curp = curp.toUpperCase()"
              />
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Contraseña</label>
            <div class="input-wrapper">
              <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
              <input
                [(ngModel)]="password"
                [type]="showPass ? 'text' : 'password'"
                placeholder="Tu contraseña"
                class="custom-input"
              />
              <ion-icon
                [name]="showPass ? 'eye-off-outline' : 'eye-outline'"
                class="input-icon-right"
                (click)="showPass = !showPass">
              </ion-icon>
            </div>
          </div>

          <p class="input-hint">
            Primera vez: usa los primeros 8 caracteres de tu CURP
          </p>

          <div *ngIf="error" class="error-box">{{ error }}</div>

          <button class="btn-login" (click)="login()" [disabled]="loading">
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Entrar</span>
          </button>
        </div>

        <p class="footer-text">Vincúla © 2026</p>
      </div>
    </ion-content>
